<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovation AR Portal</title>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #000; color: #fff; }
        .container { text-align: center; width: 100%; max-width: 400px; padding: 20px; box-sizing: border-box; }
        h1 { font-size: 1.8rem; margin-bottom: 5px; color: #fff; }
        .subtitle { font-size: 1rem; color: #888; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .ar-link { display: flex; justify-content: center; align-items: center; padding: 22px; color: white; font-weight: bold; border-radius: 16px; font-size: 1.2rem; text-decoration: none; box-shadow: 0 4px 15px rgba(255,255,255,0.05); transition: transform 0.2s; text-transform: uppercase; letter-spacing: 0.5px; }
        .ar-link:active { transform: scale(0.97); }
        .ruffles { background: #004B87; box-shadow: 0 8px 20px rgba(0,75,135,0.3); }
        .sabritas { background: #FFD100; color: #000; box-shadow: 0 8px 20px rgba(255,209,0,0.3); }
        .doritos { background: #D22630; box-shadow: 0 8px 20px rgba(210,38,48,0.3); }
        .cheetos { background: #FF6C00; box-shadow: 0 8px 20px rgba(255,108,0,0.3); }
    </style>
</head>
<body>

    <div class="container">
        <h1>AR Product Showcase</h1>
        <div class="subtitle">Select a pack format to view in AR</div>
        
        <div class="grid">
            <a rel="ar" class="ar-link ruffles" href="Ruffles.reality">Ruffles</a>
            
            <a rel="ar" class="ar-link sabritas" href="https://uvdgkgfyepgj6nnm.public.blob.vercel-storage.com/SabritasNatu.reality">Sabritas Natu</a>
            <a rel="ar" class="ar-link doritos" href="https://uvdgkgfyepgj6nnm.public.blob.vercel-storage.com/Doritos.reality">Doritos</a>
            <a rel="ar" class="ar-link cheetos" href="https://uvdgkgfyepgj6nnm.public.blob.vercel-storage.com/Cheetos.reality">Cheetos</a>
        </div>
    </div>

</body>
</html>
